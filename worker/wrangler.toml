name = "claude-code-mcp-proxy"
main = "src/index.ts"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

# Secrets (set via `wrangler secret put`):
#   GITHUB_CLIENT_ID       - GitHub OAuth App client ID
#   GITHUB_CLIENT_SECRET   - GitHub OAuth App client secret
#   COOKIE_ENCRYPTION_KEY  - Random key for cookie signing
#   ALLOWED_USERS          - Comma-separated GitHub usernames (optional)
#   FLY_API_TOKEN          - Fly.io API token
#   FLY_APP_NAME           - Fly.io app name (claude-code-mcp-flyio)
#   MACHINE_API_KEY        - Shared secret for fly machine HTTP API

[durable_objects]
bindings = [
  { name = "MCP_OBJECT", class_name = "ClaudeCodeMCP" }
]

[[migrations]]
tag = "v1"
new_classes = ["McpSession"]

[[migrations]]
tag = "v2"
deleted_classes = ["McpSession"]
new_sqlite_classes = ["ClaudeCodeMCP"]

[[kv_namespaces]]
binding = "OAUTH_KV"
id = "5ec62df428104f5a8d08e689a1f96309"

[observability]
enabled = true
