app = 'claude-code-mcp-flyio'
primary_region = 'nrt'

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = false
  min_machines_running = 0

[mounts]
  source = 'workspace'
  destination = '/workspace'

[[vm]]
  size = 'shared-cpu-2x'
  memory = '2gb'
